name: Publish to PowerShellGallery

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to validate (e.g. v1.0.8 or v1.0.9-alpha1). Optional for manual runs.'
        required: false
        type: string
      release_branch:
        description: 'Cycle branch to close after successful publication (e.g. cycle/20260306-reorganisation-ci-cd).'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PSGallery
        shell: pwsh
        run: |
          Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted

      - name: Validate tag matches ModuleVersion
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          . ./Scripts/ModuleVersion.ps1
          $releaseInfo = Get-StepperReleaseVersionInfo -ManifestPath 'ITFabrik.Stepper.psd1'
          $releaseTag = if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            $env:RELEASE_TAG
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_RELEASE_TAG)) {
            $env:INPUT_RELEASE_TAG
          } elseif (-not [string]::IsNullOrWhiteSpace($env:REF_TAG)) {
            $env:REF_TAG
          } else {
            $releaseInfo.TagName
          }
          if (-not (Test-StepperTagMatchesManifest -ManifestPath 'ITFabrik.Stepper.psd1' -TagName $releaseTag)) {
            throw "Mismatch: EffectiveVersion=$($releaseInfo.EffectiveVersion) <> Tag=$releaseTag"
          }
          Write-Host "Tag/version aligned: $releaseTag (EffectiveVersion=$($releaseInfo.EffectiveVersion))" -ForegroundColor Green

      - name: Build module artifact
        shell: pwsh
        run: |
          ./Scripts/Build-Module.ps1

      - name: Validate artifact content (strict)
        shell: pwsh
        run: |
          $modulePath = 'dist/ITFabrik.Stepper'
          $required = @('ITFabrik.Stepper.psd1', 'ITFabrik.Stepper.psm1', 'ITFabrik.Stepper.format.ps1xml', 'LICENSE', 'README.md')
          if (-not (Test-Path -LiteralPath $modulePath)) {
            throw "Artifact path not found: $modulePath"
          }
          $actual = @(Get-ChildItem -LiteralPath $modulePath -File | Select-Object -ExpandProperty Name)
          $missing = @($required | Where-Object { $_ -notin $actual })
          $extra = @($actual | Where-Object { $_ -notin $required })
          if ($missing.Count -gt 0 -or $extra.Count -gt 0) {
            throw ("Invalid artifact content. Missing: [{0}] Extra: [{1}]" -f ($missing -join ', '), ($extra -join ', '))
          }
          Write-Host 'Artifact content is strict and valid.' -ForegroundColor Green

      - name: Install PSScriptAnalyzer 1.22+
        shell: pwsh
        run: |
          $min = [version]'1.22.0'
          $installed = Get-Module -ListAvailable PSScriptAnalyzer | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $installed -or $installed.Version -lt $min) {
            Install-Module PSScriptAnalyzer -MinimumVersion 1.22.0 -Scope CurrentUser -Force -SkipPublisherCheck
          } else {
            Write-Host "PSScriptAnalyzer $($installed.Version) already available (>= $min)" -ForegroundColor Green
          }

      - name: Analyze built artifact (ScriptAnalyzer)
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -MinimumVersion 1.22.0 -Force | Out-Null
          $issues = Invoke-ScriptAnalyzer -Path 'dist/ITFabrik.Stepper/ITFabrik.Stepper.psm1' -Settings 'PSScriptAnalyzerSettings.psd1'
          if ($issues) {
            $issues | Select-Object RuleName, Severity, ScriptName, Line, Message | Format-Table -AutoSize
            throw "ScriptAnalyzer found $($issues.Count) issue(s) in built artifact."
          }
          Write-Host 'Built artifact passed ScriptAnalyzer.' -ForegroundColor Green

      - name: Publish Module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) { throw 'Missing PSGALLERY_API_KEY secret' }
          ./Scripts/Publish-PSGallery.ps1 -ApiKey $env:PSGALLERY_API_KEY -ModulePath 'dist/ITFabrik.Stepper'

      - name: Delete cycle branch after successful publish
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_BRANCH: ${{ github.event.release.target_commitish }}
          INPUT_RELEASE_BRANCH: ${{ github.event.inputs.release_branch }}
        run: |
          $branch = if (-not [string]::IsNullOrWhiteSpace($env:INPUT_RELEASE_BRANCH)) {
            $env:INPUT_RELEASE_BRANCH
          } elseif (-not [string]::IsNullOrWhiteSpace($env:RELEASE_BRANCH)) {
            $env:RELEASE_BRANCH
          } else {
            ''
          }

          if ([string]::IsNullOrWhiteSpace($branch)) {
            Write-Host 'No release branch resolved. Skipping branch deletion.'
            exit 0
          }
          if ($branch -in @('main', 'master')) {
            Write-Host "Protected branch '$branch'. Skipping branch deletion."
            exit 0
          }
          if ($branch -match '^[0-9a-fA-F]{7,40}$') {
            Write-Host "Release target '$branch' looks like a commit SHA. Skipping branch deletion."
            exit 0
          }
          if ($branch -notmatch '^cycle\/') {
            Write-Host "Branch '$branch' is not a cycle branch. Skipping branch deletion."
            exit 0
          }

          $encodedRef = [System.Uri]::EscapeDataString("heads/$branch")
          $uri = "https://api.github.com/repos/$($env:REPOSITORY)/git/refs/$encodedRef"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          try {
            Invoke-RestMethod -Method Delete -Uri $uri -Headers $headers | Out-Null
            Write-Host "Deleted remote cycle branch: $branch" -ForegroundColor Green
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -in 404, 422) {
              Write-Host "Remote cycle branch '$branch' was already absent or not deletable. Skipping."
            } else {
              throw
            }
          }
