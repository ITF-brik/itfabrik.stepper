name: Verify Tag Version

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate pushed tag matches ModuleVersion
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if (-not $env:TAG_NAME) { throw 'TAG_NAME missing from github.ref_name' }
          Write-Host "Detected tag: $env:TAG_NAME" -ForegroundColor Cyan
          . ./Scripts/ModuleVersion.ps1
          $releaseInfo = Get-StepperReleaseVersionInfo -ManifestPath 'ITFabrik.Stepper.psd1'
          if (-not (Test-StepperTagMatchesManifest -ManifestPath 'ITFabrik.Stepper.psd1' -TagName $env:TAG_NAME)) {
            throw "Mismatch: EffectiveVersion=$($releaseInfo.EffectiveVersion) <> Tag=$($env:TAG_NAME)"
          }
          Write-Host "Tag/version aligned: $($releaseInfo.TagName)" -ForegroundColor Green
